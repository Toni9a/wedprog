<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1212;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      color: #f5e6e0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid rgba(201,169,110,0.15);
    }

    .back {
      background: none;
      border: none;
      color: rgba(201,169,110,0.7);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.25s;
      text-decoration: none;
    }
    .back:hover { color: #c9a96e; }

    h1 {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
    }

    .icon-btn {
      background: none;
      border: 1px solid rgba(201,169,110,0.35);
      color: rgba(201,169,110,0.8);
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.25s, color 0.25s;
      flex-shrink: 0;
    }
    .icon-btn:hover { border-color: #c9a96e; color: #c9a96e; }

    /* Sort bar */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1.2rem;
      border-bottom: 1px solid rgba(201,169,110,0.06);
    }
    .sort-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,230,224,0.25);
    }
    .sort-sep {
      color: rgba(245,230,224,0.15);
      font-size: 0.75rem;
    }
    .sort-opt {
      background: none;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,230,224,0.28);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .sort-opt.active { color: #c9a96e; }
    .sort-opt:hover  { color: rgba(201,169,110,0.7); }

    /* Filter pills */
    .filters {
      display: flex;
      gap: 0.5rem;
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(201,169,110,0.08);
      overflow-x: auto;
    }
    .pill {
      background: none;
      border: 1px solid rgba(201,169,110,0.25);
      color: rgba(245,230,224,0.45);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.22s;
    }
    .pill.active, .pill:hover { border-color: #c9a96e; color: #c9a96e; }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
    }

    @media (min-width: 600px) {
      #grid { grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px; }
    }

    .grid-item {
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: #2a1f1f;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .grid-item.visible { opacity: 1; }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .grid-item:hover img { transform: scale(1.04); }

    /* Loading / empty */
    #status {
      text-align: center;
      padding: 5rem 2rem;
      color: rgba(245,230,224,0.3);
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.1em;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(15,10,10,0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }

    #lb-img-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-img {
      max-width: 92vw;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 2px;
      transition: opacity 0.4s ease;
      will-change: opacity;
      user-select: none;
      -webkit-user-drag: none;
    }
    #lb-img.fade { opacity: 0; }

    .lb-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem;
      z-index: 10;
    }

    #lb-counter {
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
    }

    #lb-close {
      background: none;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: border-color 0.25s;
    }
    #lb-close:hover { border-color: #c9a96e; }

    .lb-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: #fff;
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: border-color 0.25s;
    }
    .lb-arrow:hover { border-color: #c9a96e; }
    #lb-prev { left: clamp(0.5rem, 3vw, 2rem); }
    #lb-next { right: clamp(0.5rem, 3vw, 2rem); }

    /* Caption */
    #lb-caption {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #lb-caption.fade { opacity: 0; }
    #lb-name {
      color: #c9a96e;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    #lb-note {
      color: rgba(245,230,224,0.5);
      font-style: italic;
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }
    #lb-location {
      color: rgba(201,169,110,0.5);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* ── SELECTION MODE ── */
    .btn-select {
      background: none;
      border: none;
      color: rgba(201,169,110,0.7);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.25s;
    }
    .btn-select:hover, .btn-select.active { color: #c9a96e; }

    .grid-item.selected::after {
      content: '✓';
      position: absolute;
      inset: 0;
      background: rgba(201,169,110,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #fff;
    }
    .grid-item.selected img { transform: scale(0.94); }

    #download-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a1212;
      border-top: 1px solid rgba(201,169,110,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    #download-bar.show { transform: translateY(0); }

    #sel-count {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,230,224,0.5);
    }

    .bar-actions { display: flex; gap: 0.8rem; align-items: center; }

    #btn-download-sel {
      border: 1px solid #c9a96e;
      background: #c9a96e;
      color: #1a1212;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    #btn-download-sel:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-download-sel:not(:disabled):hover { opacity: 0.85; }

    #btn-cancel-sel {
      background: none;
      border: none;
      color: rgba(245,230,224,0.4);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    #btn-cancel-sel:hover { color: rgba(245,230,224,0.8); }
  </style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <header>
    <button class="back" onclick="location.href='index.html'">← Program</button>
    <h1>Guest Photos</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
    <button class="btn-select" id="btn-select-mode">Select</button>
    <a href="upload.html" class="icon-btn" title="Upload photos">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </a>
    </div>
  </header>

  <!-- DOWNLOAD BAR -->
  <div id="download-bar">
    <span id="sel-count">0 selected</span>
    <div class="bar-actions">
      <button id="btn-cancel-sel">Cancel</button>
      <button id="btn-download-sel" disabled>Download</button>
    </div>
  </div>

  <div class="filters">
    <button class="pill active" data-loc="">All</button>
    <button class="pill" data-loc="Bridal Shower">Bridal Shower</button>
    <button class="pill" data-loc="Trad">Trad</button>
    <button class="pill" data-loc="Reception">Reception</button>
    <button class="pill" data-loc="Food">Food</button>
  </div>
  <div class="sort-bar">
    <span class="sort-label">View by</span>
    <button class="sort-opt active" id="sort-recent">Recent</button>
    <span class="sort-sep">·</span>
    <button class="sort-opt" id="sort-timeline">Timeline</button>
  </div>

  <div id="status">Loading photos…</div>
  <div id="grid"></div>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <div class="lb-top">
      <span id="lb-counter"></span>
      <button id="lb-close">✕</button>
    </div>
    <div id="lb-img-wrap">
      <img id="lb-img" src="" alt="Guest photo" />
    </div>
    <button class="lb-arrow" id="lb-prev">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lb-arrow" id="lb-next">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
    <div id="lb-caption">
      <div id="lb-name"></div>
      <div id="lb-note"></div>
      <div id="lb-location"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const WORKER = '/api';

    let allPhotos = [];
    let filtered  = [];
    let current   = 0;
    let activeFilter = '';
    let activeSort   = 'recent'; // 'recent' | 'timeline'

    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lb-img');
    const lbCounter  = document.getElementById('lb-counter');
    const lbCaption  = document.getElementById('lb-caption');
    const lbName     = document.getElementById('lb-name');
    const lbNote     = document.getElementById('lb-note');
    const lbLocation = document.getElementById('lb-location');
    const grid       = document.getElementById('grid');
    const status     = document.getElementById('status');

    // Filter pills
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeFilter = pill.dataset.loc;
        applyFilter();
      });
    });

    // Sort
    document.getElementById('sort-recent').addEventListener('click', () => {
      activeSort = 'recent';
      document.getElementById('sort-recent').classList.add('active');
      document.getElementById('sort-timeline').classList.remove('active');
      applyFilter();
    });
    document.getElementById('sort-timeline').addEventListener('click', () => {
      activeSort = 'timeline';
      document.getElementById('sort-timeline').classList.add('active');
      document.getElementById('sort-recent').classList.remove('active');
      applyFilter();
    });

    function applyFilter() {
      let pool = activeFilter ? allPhotos.filter(p => p.location === activeFilter) : allPhotos;
      if (activeSort === 'timeline') {
        // sort by actual photo timestamp ascending (oldest first = true chronological order)
        pool = [...pool].sort((a, b) => {
          const ta = parseInt(a.photoTakenAt) || parseInt(a.timestamp) || 0;
          const tb = parseInt(b.photoTakenAt) || parseInt(b.timestamp) || 0;
          return ta - tb;
        });
      } else {
        // recent: sort by upload time descending
        pool = [...pool].sort((a, b) => parseInt(b.timestamp) - parseInt(a.timestamp));
      }
      filtered = pool;
      renderGrid();
    }

    function renderGrid() {
      grid.innerHTML = '';
      if (!filtered.length) {
        status.style.display = 'block';
        status.textContent = allPhotos.length ? 'No photos for this location yet.' : 'No photos yet — be the first to share!';
        return;
      }
      status.style.display = 'none';
      filtered.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'grid-item';
        const img = document.createElement('img');
        img.src = `${WORKER}${p.url}`;
        img.alt = p.name;
        img.loading = 'lazy';
        img.onload = () => div.classList.add('visible');
        div.appendChild(img);
        if (selected.has(i)) div.classList.add('selected');
        div.addEventListener('click', () => {
          if (selectMode) toggleSelect(i, div);
          else openLightbox(i);
        });
        grid.appendChild(div);
      });
    }

    async function loadGallery() {
      try {
        const res = await fetch(`${WORKER}/gallery`);
        const { photos: data } = await res.json();
        allPhotos = data;
        filtered  = data;
        if (!allPhotos.length) {
          status.textContent = 'No photos yet — be the first to share!';
          return;
        }
        renderGrid();
      } catch (e) {
        status.textContent = 'Could not load photos. Please refresh.';
      }
    }

    function openLightbox(i) {
      current = i;
      setSlide(i, false);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function setSlide(i, animate = true) {
      current = (i + filtered.length) % filtered.length;
      const p = filtered[current];

      if (animate) {
        lbImg.classList.add('fade');
        lbCaption.classList.add('fade');
        setTimeout(() => {
          lbImg.src = `${WORKER}${p.url}`;
          lbImg.onload = () => lbImg.classList.remove('fade');
          setTimeout(() => lbImg.classList.remove('fade'), 700);
          lbCaption.classList.remove('fade');
          updateCaption(p);
          lbCounter.textContent = `${current + 1} / ${filtered.length}`;
        }, 350);
      } else {
        lbImg.src = `${WORKER}${p.url}`;
        updateCaption(p);
        lbCounter.textContent = `${current + 1} / ${filtered.length}`;
      }
    }

    function updateCaption(p) {
      lbName.textContent     = p.name !== 'Anonymous' ? p.name : '';
      lbNote.textContent     = p.note || '';
      lbLocation.textContent = p.location || '';
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => setSlide(current - 1));
    document.getElementById('lb-next').addEventListener('click', () => setSlide(current + 1));

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  setSlide(current - 1);
      if (e.key === 'ArrowRight') setSlide(current + 1);
      if (e.key === 'Escape')     closeLightbox();
    });

    // ── SELECTION MODE ──
    let selectMode = false;
    let selected = new Set();

    const btnSelectMode   = document.getElementById('btn-select-mode');
    const downloadBar     = document.getElementById('download-bar');
    const selCount        = document.getElementById('sel-count');
    const btnDownloadSel  = document.getElementById('btn-download-sel');
    const btnCancelSel    = document.getElementById('btn-cancel-sel');

    btnSelectMode.addEventListener('click', () => toggleSelectMode(true));
    btnCancelSel.addEventListener('click', () => toggleSelectMode(false));

    function toggleSelectMode(on) {
      selectMode = on;
      selected.clear();
      btnSelectMode.classList.toggle('active', on);
      downloadBar.classList.toggle('show', on);
      updateSelCount();
      // Re-render so click handlers update
      renderGrid();
    }

    function toggleSelect(i, el) {
      if (selected.has(i)) { selected.delete(i); el.classList.remove('selected'); }
      else                  { selected.add(i);    el.classList.add('selected'); }
      updateSelCount();
    }

    function updateSelCount() {
      const n = selected.size;
      selCount.textContent = n === 1 ? '1 selected' : `${n} selected`;
      btnDownloadSel.disabled = n === 0;
    }

    btnDownloadSel.addEventListener('click', async () => {
      const items = [...selected].map(i => filtered[i]);
      if (!items.length) return;

      btnDownloadSel.textContent = 'Zipping…';
      btnDownloadSel.disabled = true;

      try {
        const zip = new JSZip();
        await Promise.all(items.map(async (p, idx) => {
          const res  = await fetch(`${WORKER}${p.url}`);
          const blob = await res.blob();
          const ext  = p.url.split('.').pop().split('?')[0] || 'jpg';
          zip.file(`photo_${idx + 1}.${ext}`, blob);
        }));
        const content = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = 'wedding_photos.zip';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        alert('Download failed — please try again.');
      }

      btnDownloadSel.textContent = 'Download';
      btnDownloadSel.disabled = false;
      toggleSelectMode(false);
    });

    let tx = 0;
    lightbox.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 40) dx < 0 ? setSlide(current + 1) : setSlide(current - 1);
    }, { passive: true });

    loadGallery();
  </script>
</body>
</html>
