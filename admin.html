<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Wedding Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1212;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      color: #f5e6e0;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.2rem;
    }

    #login-screen h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
    }

    #login-screen input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 2px;
      color: #f5e6e0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      padding: 0.7rem 1.2rem;
      outline: none;
      width: 100%;
      max-width: 300px;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.25s;
    }
    #login-screen input:focus { border-color: #c9a96e; }

    #login-btn {
      border: 1px solid #c9a96e;
      background: transparent;
      color: #f5e6e0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.65rem 2rem;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    #login-btn:hover { background: #c9a96e; color: #1a1212; }

    #login-error {
      color: rgba(255,100,100,0.7);
      font-size: 0.85rem;
      font-style: italic;
      display: none;
    }

    /* ── MAIN ADMIN UI ── */
    #app { display: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(201,169,110,0.15);
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c9a96e;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.3rem;
    }

    .tab {
      background: none;
      border: 1px solid rgba(201,169,110,0.25);
      color: rgba(245,230,224,0.5);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab.active, .tab:hover {
      border-color: #c9a96e;
      color: #c9a96e;
    }

    /* Counts */
    .counts {
      display: flex;
      gap: 1.5rem;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid rgba(201,169,110,0.1);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,230,224,0.4);
    }
    .counts span { color: #c9a96e; }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
      padding: 3px;
    }
    @media (min-width: 500px) { #grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px) { #grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      position: relative;
      background: #2a1f1f;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .card.visible { opacity: 1; }
    .card.hidden { display: none; }

    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 0.6rem 0.8rem;
    }
    .card-name {
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: #c9a96e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-note {
      font-size: 0.78rem;
      font-style: italic;
      color: rgba(245,230,224,0.4);
      margin-top: 0.15rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badge {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }
    .badge.pending { background: rgba(201,169,110,0.85); color: #1a1212; }
    .badge.approved { background: rgba(50,180,100,0.85); color: #fff; }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      padding: 0 0.8rem 0.8rem;
    }

    .btn-approve, .btn-delete {
      flex: 1;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.5rem;
      cursor: pointer;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    .btn-approve { background: #c9a96e; color: #1a1212; }
    .btn-delete  { background: rgba(180,60,60,0.7); color: #fff; }
    .btn-approve:hover { opacity: 0.85; }
    .btn-delete:hover  { opacity: 0.85; }
    .btn-approve:disabled { opacity: 0.3; cursor: default; }

    #status {
      text-align: center;
      padding: 4rem 2rem;
      color: rgba(245,230,224,0.3);
      font-style: italic;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #c9a96e;
      color: #1a1212;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1.6rem;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h1>Admin Access</h1>
    <input type="password" id="pw-input" placeholder="Password" />
    <button id="login-btn">Enter</button>
    <div id="login-error">Incorrect password</div>
  </div>

  <!-- ADMIN APP -->
  <div id="app">
    <header>
      <h1>Wedding Gallery — Admin</h1>
      <div class="tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="pending">Pending</button>
        <button class="tab" data-filter="approved">Approved</button>
      </div>
    </header>
    <div class="counts" id="counts">
      <button id="approve-all-btn" style="display:none;margin-left:auto;background:none;border:1px solid rgba(201,169,110,0.5);color:#c9a96e;font-family:'Cormorant Garamond',serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.25rem 0.9rem;cursor:pointer;border-radius:2px;transition:all 0.2s;">Approve All Pending</button>
    </div>
    <div id="counts-text"></div>
    <div id="status">Loading…</div>
    <div id="grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const WORKER = 'https://wedding-uploads-worker.oluwatoni-esan.workers.dev';
    let password = '';
    let photos = [];
    let currentFilter = 'all';

    // ── LOGIN ──
    const loginBtn  = document.getElementById('login-btn');
    const pwInput   = document.getElementById('pw-input');
    const loginErr  = document.getElementById('login-error');

    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    loginBtn.addEventListener('click', async () => {
      const pw = pwInput.value.trim();
      if (!pw) return;
      // Test the password against the worker
      const res = await fetch(`${WORKER}/admin/photos`, {
        headers: { 'X-Admin-Password': pw }
      });
      if (res.status === 401) {
        loginErr.style.display = 'block';
        return;
      }
      password = pw;
      loginErr.style.display = 'none';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      const { photos: data } = await res.json();
      photos = data;
      renderGrid();
    });

    // ── TABS ──
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderGrid();
      });
    });

    function renderGrid() {
      const grid   = document.getElementById('grid');
      const status = document.getElementById('status');
      const approveAllBtn = document.getElementById('approve-all-btn');
      const countsText    = document.getElementById('counts-text');

      const pending  = photos.filter(p => p.status === 'pending').length;
      const approved = photos.filter(p => p.status === 'approved').length;
      countsText.innerHTML = `<div style="padding:0.4rem 1.5rem 0.8rem;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,230,224,0.4);">Pending: <span style="color:#c9a96e">${pending}</span> &nbsp;|&nbsp; Approved: <span style="color:#c9a96e">${approved}</span> &nbsp;|&nbsp; Total: <span style="color:#c9a96e">${photos.length}</span></div>`;
      approveAllBtn.style.display = pending > 0 ? 'block' : 'none';

      const filtered = currentFilter === 'all' ? photos : photos.filter(p => p.status === currentFilter);
      grid.innerHTML = '';

      if (!filtered.length) {
        status.style.display = 'block';
        status.textContent = photos.length ? 'Nothing in this category.' : 'No photos uploaded yet.';
        return;
      }
      status.style.display = 'none';

      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.key = p.key;

        const img = document.createElement('img');
        img.src = `${WORKER}${p.url}`;
        img.alt = p.name;
        img.loading = 'lazy';
        img.onload = () => card.classList.add('visible');

        const badge = document.createElement('div');
        badge.className = `badge ${p.status}`;
        badge.textContent = p.status;

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `<div class="card-name">${escHtml(p.name)}</div>${p.note ? `<div class="card-note">${escHtml(p.note)}</div>` : ''}`;

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const appBtn = document.createElement('button');
        appBtn.className = 'btn-approve';
        appBtn.textContent = p.status === 'approved' ? '✓ Approved' : 'Approve';
        if (p.status === 'approved') appBtn.disabled = true;
        appBtn.addEventListener('click', () => approvePhoto(p.key, card, appBtn, badge));

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-delete';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', () => deletePhoto(p.key, card));

        actions.append(appBtn, delBtn);
        card.append(img, badge, info, actions);
        grid.appendChild(card);
      });
    }

    async function approvePhoto(key, card, btn, badge) {
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const res = await fetch(`${WORKER}/admin/approve`, {
          method: 'POST',
          headers: { 'X-Admin-Password': password, 'Content-Type': 'application/json' },
          body: JSON.stringify({ key }),
        });
        if (!res.ok) throw new Error();
        const { newKey } = await res.json();
        // Update local data
        const photo = photos.find(p => p.key === key);
        if (photo) {
          photo.key = newKey;
          photo.url = `/photo/${encodeURIComponent(newKey)}`;
          photo.status = 'approved';
        }
        btn.textContent = '✓ Approved';
        badge.className = 'badge approved';
        badge.textContent = 'approved';
        renderCounts();
        showToast('Approved ✓');
      } catch {
        btn.disabled = false;
        btn.textContent = 'Approve';
        showToast('Error — try again');
      }
    }

    async function deletePhoto(key, card) {
      if (!confirm('Delete this photo permanently?')) return;
      try {
        await fetch(`${WORKER}/admin/delete`, {
          method: 'DELETE',
          headers: { 'X-Admin-Password': password, 'Content-Type': 'application/json' },
          body: JSON.stringify({ key }),
        });
        photos = photos.filter(p => p.key !== key);
        card.style.opacity = '0';
        setTimeout(() => { card.remove(); renderCounts(); }, 500);
        showToast('Deleted');
      } catch {
        showToast('Error — try again');
      }
    }

    function renderCounts() {
      const approveAllBtn = document.getElementById('approve-all-btn');
      const countsText    = document.getElementById('counts-text');
      const pending  = photos.filter(p => p.status === 'pending').length;
      const approved = photos.filter(p => p.status === 'approved').length;
      countsText.innerHTML = `<div style="padding:0.4rem 1.5rem 0.8rem;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,230,224,0.4);">Pending: <span style="color:#c9a96e">${pending}</span> &nbsp;|&nbsp; Approved: <span style="color:#c9a96e">${approved}</span> &nbsp;|&nbsp; Total: <span style="color:#c9a96e">${photos.length}</span></div>`;
      approveAllBtn.style.display = pending > 0 ? 'block' : 'none';
    }

    // Approve All
    document.getElementById('approve-all-btn').addEventListener('click', async () => {
      const pending = photos.filter(p => p.status === 'pending');
      if (!pending.length) return;
      if (!confirm(`Approve all ${pending.length} pending photos?`)) return;
      document.getElementById('approve-all-btn').textContent = 'Approving…';
      document.getElementById('approve-all-btn').disabled = true;
      let done = 0;
      for (const p of pending) {
        try {
          const res = await fetch(`${WORKER}/admin/approve`, {
            method: 'POST',
            headers: { 'X-Admin-Password': password, 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: p.key }),
          });
          if (res.ok) {
            const { newKey } = await res.json();
            p.key    = newKey;
            p.url    = `/photo/${encodeURIComponent(newKey)}`;
            p.status = 'approved';
            done++;
          }
        } catch {}
      }
      showToast(`Approved ${done} photos`);
      renderGrid();
    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
